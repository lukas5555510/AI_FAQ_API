services:
  web:
    build: .
    container_name: ai_faq_app
    command: >
      /app/.venv/bin/uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started

  db:
    image: postgres:15
    container_name: ai_faq_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ai_faq_data:/var/lib/postgresql/data

volumes:
  ai_faq_data: